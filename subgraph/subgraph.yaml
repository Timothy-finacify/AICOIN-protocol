specVersion: 1.0.0
schema:
  file: ./schema.graphql

dataSources:
  # ============ AICOIN TOKEN ============
  - kind: ethereum
    name: AICOIN
    network: sepolia
    source:
      address: "0x88227791E59F5773E201210Bada58Cf42692A120"
      abi: AICOIN
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Transfer
        - BurnStat
        - BurnMilestone
      abis:
        - name: AICOIN
          file: ./abis/AICOIN.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: TokensBurned(uint256)
          handler: handleTokensBurned
        - event: BurnMilestone(uint256,uint256)
          handler: handleBurnMilestone
      file: ./src/aicoin.ts

