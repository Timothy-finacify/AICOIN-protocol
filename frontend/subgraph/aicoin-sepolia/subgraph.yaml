specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AICOIN
    network: sepolia
    source:
      address: "0xB52612f12117713437639E713801844B4bAFb60c"
      abi: AICOIN
      startBlock: 10853951
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Transfer
        - TokensBurned
      abis:
        - name: AICOIN
          file: ./abis/AICOIN.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: TokensBurned(uint256)
          handler: handleTokensBurned
      file: ./src/aicoin.ts
